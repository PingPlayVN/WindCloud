name: Check Code Quality (CI)

# Kích hoạt action này mỗi khi push hoặc tạo PR vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest # Chạy trên máy chủ ảo Ubuntu mới nhất

    steps:
      # 1. Tải mã nguồn của bạn về máy chủ ảo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Sử dụng Node.js phiên bản 18
          cache: 'npm'       # Lưu cache để các lần sau chạy nhanh hơn

      # 3. Cài đặt các thư viện trong package.json (eslint, prettier, husky...)
      - name: Install dependencies
        run: npm ci

      # 4. Chạy lệnh kiểm tra lỗi code (đã được định nghĩa trong package.json của bạn)
      - name: Check code formatting and errors
        run: npm run lint