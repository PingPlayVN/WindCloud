<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020" />
      <stop offset="0.55" stop-color="#141b3a" />
      <stop offset="1" stop-color="#0b1020" />
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="45%" r="65%">
      <stop offset="0" stop-color="#6ee7ff" stop-opacity="0.25" />
      <stop offset="0.45" stop-color="#7c3aed" stop-opacity="0.18" />
      <stop offset="1" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" />
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="400" height="220" rx="18" fill="url(#bg)" />
  <rect x="0" y="0" width="400" height="220" rx="18" fill="url(#glow)" />

  <!-- stars -->
  <g fill="#e6f4ff" opacity="0.95">
    <circle cx="52" cy="54" r="1.2" />
    <circle cx="88" cy="42" r="1.6" />
    <circle cx="126" cy="70" r="1.1" />
    <circle cx="162" cy="46" r="1.4" />
    <circle cx="196" cy="64" r="1.2" />
    <circle cx="234" cy="44" r="1.8" />
    <circle cx="276" cy="78" r="1.2" />
    <circle cx="312" cy="56" r="1.5" />
    <circle cx="352" cy="86" r="1.1" />
    <circle cx="70" cy="132" r="1.3" />
    <circle cx="114" cy="146" r="1.1" />
    <circle cx="156" cy="124" r="1.6" />
    <circle cx="202" cy="150" r="1.2" />
    <circle cx="244" cy="132" r="1.4" />
    <circle cx="292" cy="156" r="1.1" />
    <circle cx="334" cy="138" r="1.6" />
  </g>

  <!-- constellation lines -->
  <g stroke="#9be7ff" stroke-opacity="0.55" stroke-width="1.2" fill="none">
    <path d="M88 42 L162 46 L234 44 L312 56" />
    <path d="M70 132 L156 124 L244 132 L334 138" />
    <path d="M162 46 L156 124" />
    <path d="M234 44 L244 132" />
  </g>

  <!-- constellation nodes -->
  <g>
    <circle cx="162" cy="46" r="3.3" fill="#ffffff" filter="url(#soft)" opacity="0.65" />
    <circle cx="234" cy="44" r="3.8" fill="#ffffff" filter="url(#soft)" opacity="0.7" />
    <circle cx="156" cy="124" r="3.2" fill="#ffffff" filter="url(#soft)" opacity="0.6" />
    <circle cx="244" cy="132" r="3.5" fill="#ffffff" filter="url(#soft)" opacity="0.62" />
  </g>

  <!-- center emblem -->
  <g transform="translate(200 110)">
    <circle r="44" fill="none" stroke="#a5b4fc" stroke-opacity="0.55" stroke-width="1.4" />
    <circle r="32" fill="none" stroke="#67e8f9" stroke-opacity="0.45" stroke-width="1.2" />
    <path d="M0 -40 L7 -10 L40 0 L7 10 L0 40 L-7 10 L-40 0 L-7 -10 Z" fill="#e6f4ff" opacity="0.9" />
    <circle r="6.5" fill="#fff" opacity="0.95" />
    <circle r="12" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="8" />
  </g>

  <!-- label -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="18" y="198" font-size="18" font-weight="800" fill="#e6f4ff" opacity="0.95">Tử Vi</text>
    <text x="74" y="198" font-size="13" font-weight="600" fill="#a5b4fc" opacity="0.9">CanChi</text>
  </g>
</svg>

