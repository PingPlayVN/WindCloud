<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140008" />
      <stop offset="1" stop-color="#4a0b1a" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#f1c40f" stop-opacity="0.35" />
      <stop offset="1" stop-color="#f1c40f" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.55" />
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" />
  <rect width="800" height="400" fill="url(#glow)" />

  <g filter="url(#shadow)" transform="translate(90 95)">
    <rect x="0" y="0" width="160" height="160" rx="22" fill="#ffffff" opacity="0.92" />
    <circle cx="55" cy="55" r="10" fill="#111" />
    <circle cx="105" cy="105" r="10" fill="#111" />
  </g>

  <g filter="url(#shadow)" transform="translate(230 145) rotate(-10)">
    <rect x="0" y="0" width="160" height="160" rx="22" fill="#ffffff" opacity="0.92" />
    <circle cx="55" cy="55" r="10" fill="#111" />
    <circle cx="105" cy="55" r="10" fill="#111" />
    <circle cx="80" cy="105" r="10" fill="#111" />
  </g>

  <g transform="translate(420 120)">
    <text x="0" y="0" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="54" font-weight="800" fill="#f1c40f">
      TÀI XỈU
    </text>
    <text x="0" y="48" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="20" font-weight="600" fill="#f6f6f6" opacity="0.92">
      Wind Game • Dice Card
    </text>
    <rect x="0" y="75" width="290" height="4" rx="2" fill="#f1c40f" opacity="0.75" />
  </g>
</svg>
